name: Build Release APK

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~ ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: gradle-release-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prebuild Android project
        run: bunx expo prebuild --platform android --no-install

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Generate dummy keystore
        run: |
          keytool -genkey -v -keystore dummy.keystore -alias dummy -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Dummy, OU=Dev, O=Dev, L=Unknown, S=Unknown, C=US"

      - name: Build release APK
        env:
          JAVA_TOOL_OPTIONS: "-Xmx5g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../dummy.keystore \
            -Pandroid.injected.signing.store.password=password \
            -Pandroid.injected.signing.key.alias=dummy \
            -Pandroid.injected.signing.key.password=password \
            --no-daemon --stacktrace --info 2>&1

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tik-down-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/dev'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
